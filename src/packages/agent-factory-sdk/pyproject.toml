[project]
name = "agent-factory-sdk"
version = "0.1.0"
description = "Contract, loader, and test harness for standardized LangGraph sub-agent packages"
readme = "README.md"
requires-python = ">=3.14,<3.15"
dependencies = [
    "langgraph>=0.6",
    "langchain-core>=0.3",
    "langchain-anthropic>=0.3",
    "pydantic>=2.7",
    "deepagents>=0.6.7,<0.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_factory_sdk"]
