[project]
name = "agent-calculator"
version = "0.1.0"
description = "Example sub-agent: ReAct tool-calling calculator"
requires-python = ">=3.14,<3.15"
dependencies = [
    "agent-factory-sdk",
]

[project.entry-points."agent_factory.agents"]
calculator = "agent_calculator:AGENT"

[tool.uv.sources]
agent-factory-sdk = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_calculator"]
